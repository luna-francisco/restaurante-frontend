<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>restaurante-frontend</title>
    <script>
      (function (l) {
        if (l.search && l.search.startsWith("?/") && l.search.length > 2) {
          var decoded = l.search
            .slice(2)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          var newPath = l.pathname.replace(/\/$/, "") + "/" + decoded + l.hash;
          window.history.replaceState(null, "", newPath);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
