<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=./" />
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        var origin = l.protocol + "//" + l.host;
        var basePath = l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/");
        var rest = l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/");
        var search = l.search.replace(/&/g, "~and~");
        var redirect = origin + basePath + "/?/" + rest + search + l.hash;
        l.replace(redirect);
      })();
    </script>
    <title>Redirecting...</title>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
